<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366F1"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#DC2626"/>
    </marker>
    <linearGradient id="gCisa" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="100%" stop-color="#BFDBFE"/>
    </linearGradient>
    <linearGradient id="gSync" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
    <linearGradient id="gCatalog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="gWazuh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FED7AA"/>
      <stop offset="100%" stop-color="#FDBA74"/>
    </linearGradient>
    <linearGradient id="gKev" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FECACA"/>
      <stop offset="100%" stop-color="#FCA5A5"/>
    </linearGradient>
    <linearGradient id="gAlert" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEE2E2"/>
      <stop offset="100%" stop-color="#FECACA"/>
    </linearGradient>
    <linearGradient id="gDash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A7F3D0"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="880" height="380" rx="16" fill="#F8FAFC"/>
  <text x="440" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1E293B">KEV Enrichment Pipeline</text>

  <!-- Row 1: CISA → Sync → Catalog -->
  <rect x="30" y="60" width="170" height="80" rx="12" fill="url(#gCisa)" filter="url(#shadow)"/>
  <text x="115" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">CISA Website</text>
  <text x="115" y="108" text-anchor="middle" font-size="10" fill="#3B82F6">KEV JSON feed</text>
  <text x="115" y="122" text-anchor="middle" font-size="9" fill="#60A5FA">updated regularly</text>

  <line x1="200" y1="100" x2="260" y2="100" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="262" y="60" width="170" height="80" rx="12" fill="url(#gSync)" filter="url(#shadow)"/>
  <text x="347" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#4338CA">kev_sync.py</text>
  <text x="347" y="108" text-anchor="middle" font-size="10" fill="#6366F1">downloads &amp; processes</text>
  <text x="347" y="122" text-anchor="middle" font-size="9" fill="#818CF8">runs daily via systemd</text>

  <line x1="432" y1="100" x2="492" y2="100" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="494" y="60" width="170" height="80" rx="12" fill="url(#gCatalog)" filter="url(#shadow)"/>
  <text x="579" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#5B21B6">Local Catalog</text>
  <text x="579" y="108" text-anchor="middle" font-size="10" fill="#7C3AED">kev_catalog.json</text>
  <text x="579" y="122" text-anchor="middle" font-size="9" fill="#8B5CF6">CVE → metadata lookup</text>

  <!-- Vertical line from catalog down -->
  <line x1="579" y1="140" x2="579" y2="190" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 2: Wazuh alert → custom-kev → enriched alert -->
  <rect x="30" y="192" width="170" height="80" rx="12" fill="url(#gWazuh)" filter="url(#shadow)"/>
  <text x="115" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">Wazuh Alert</text>
  <text x="115" y="240" text-anchor="middle" font-size="10" fill="#C2410C">vulnerability detected</text>
  <text x="115" y="254" text-anchor="middle" font-size="9" fill="#EA580C">on an endpoint</text>

  <line x1="200" y1="232" x2="350" y2="232" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowRed)"/>

  <rect x="352" y="192" width="220" height="80" rx="12" fill="url(#gKev)" filter="url(#shadow)"/>
  <text x="462" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">custom-kev</text>
  <text x="462" y="236" text-anchor="middle" font-size="10" fill="#B91C1C">checks CVE against catalog</text>
  <text x="462" y="254" text-anchor="middle" font-size="9" fill="#DC2626">Wazuh integration script</text>

  <line x1="572" y1="232" x2="632" y2="232" stroke="#DC2626" stroke-width="2" marker-end="url(#arrowRed)"/>

  <rect x="634" y="192" width="220" height="80" rx="12" fill="url(#gAlert)" filter="url(#shadow)"/>
  <text x="744" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#991B1B">Enriched Alert</text>
  <text x="744" y="236" text-anchor="middle" font-size="10" fill="#B91C1C">Level 15 · Rule 99901</text>
  <text x="744" y="254" text-anchor="middle" font-size="9" fill="#DC2626">+ KEV metadata &amp; due date</text>

  <!-- Arrow down to dashboard -->
  <line x1="744" y1="272" x2="744" y2="310" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#059669"/>
    </marker>
  </defs>

  <!-- Row 3: Elasticsearch → Dashboard -->
  <rect x="440" y="312" width="200" height="54" rx="10" fill="url(#gWazuh)" filter="url(#shadow)"/>
  <text x="540" y="336" text-anchor="middle" font-size="12" font-weight="600" fill="#9A3412">Elasticsearch</text>
  <text x="540" y="352" text-anchor="middle" font-size="10" fill="#C2410C">stores the alert</text>

  <line x1="640" y1="339" x2="688" y2="339" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="690" y="312" width="170" height="54" rx="10" fill="url(#gDash)" filter="url(#shadow)"/>
  <text x="775" y="336" text-anchor="middle" font-size="12" font-weight="600" fill="#065F46">Dashboard</text>
  <text x="775" y="352" text-anchor="middle" font-size="10" fill="#047857">you see the alert</text>
</svg>
