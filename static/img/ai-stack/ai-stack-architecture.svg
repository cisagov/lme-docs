<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="gradBrowser" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
    <linearGradient id="gradProxy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="gradLlama" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="gradEmbed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A7F3D0"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
    <linearGradient id="gradPg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BFDBFE"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="gradES" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FED7AA"/>
      <stop offset="100%" stop-color="#FDBA74"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="880" height="620" rx="16" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1E293B">LME AI Stack Architecture</text>

  <!-- Browser Layer -->
  <rect x="120" y="60" width="640" height="80" rx="12" fill="url(#gradBrowser)" filter="url(#shadow)"/>
  <text x="440" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#4338CA" letter-spacing="1">YOUR BROWSER</text>
  <rect x="160" y="100" width="240" height="30" rx="6" fill="#fff" fill-opacity="0.7"/>
  <text x="280" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#3730A3">LME Dashboard</text>
  <text x="280" y="132" text-anchor="middle" font-size="9" fill="#6366F1">port 8502</text>
  <rect x="480" y="100" width="240" height="30" rx="6" fill="#fff" fill-opacity="0.7"/>
  <text x="600" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#3730A3">Log Analyzer</text>
  <text x="600" y="132" text-anchor="middle" font-size="9" fill="#6366F1">port 8501</text>

  <!-- Arrows from browser -->
  <line x1="280" y1="140" x2="280" y2="188" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="600" y1="140" x2="600" y2="188" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Middle Row: LiteLLM + Elasticsearch -->
  <rect x="120" y="190" width="300" height="80" rx="12" fill="url(#gradProxy)" filter="url(#shadow)"/>
  <text x="270" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="#5B21B6">LiteLLM Proxy</text>
  <text x="270" y="242" text-anchor="middle" font-size="11" fill="#7C3AED">API gateway for all LLM requests</text>
  <text x="270" y="258" text-anchor="middle" font-size="10" fill="#8B5CF6">port 4000 · HTTPS</text>

  <rect x="460" y="190" width="300" height="80" rx="12" fill="url(#gradES)" filter="url(#shadow)"/>
  <text x="610" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="#9A3412">Elasticsearch</text>
  <text x="610" y="242" text-anchor="middle" font-size="11" fill="#C2410C">Stores all your logs and alerts</text>
  <text x="610" y="258" text-anchor="middle" font-size="10" fill="#EA580C">port 9200 · HTTPS</text>

  <!-- Arrow from LiteLLM down -->
  <line x1="200" y1="270" x2="200" y2="340" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="340" y1="270" x2="500" y2="340" stroke="#059669" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowGreen)"/>

  <!-- Bottom Row: llama.cpp + Embeddings -->
  <rect x="60" y="342" width="280" height="90" rx="12" fill="url(#gradLlama)" filter="url(#shadow)"/>
  <circle cx="100" cy="372" r="16" fill="#F59E0B" fill-opacity="0.3"/>
  <text x="100" y="377" text-anchor="middle" font-size="16">🦙</text>
  <text x="220" y="372" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E">llama.cpp</text>
  <text x="200" y="392" text-anchor="middle" font-size="11" fill="#B45309">Local chat model (LFM2.5 1.2B)</text>
  <text x="200" y="410" text-anchor="middle" font-size="10" fill="#D97706">port 8080 · HTTPS · internal</text>

  <rect x="400" y="342" width="280" height="90" rx="12" fill="url(#gradEmbed)" filter="url(#shadow)"/>
  <text x="540" y="372" text-anchor="middle" font-size="14" font-weight="700" fill="#065F46">Embeddings Server</text>
  <text x="540" y="392" text-anchor="middle" font-size="11" fill="#047857">nomic-embed-text for RAG search</text>
  <text x="540" y="410" text-anchor="middle" font-size="10" fill="#059669">port 8081 · HTTPS</text>

  <!-- Arrow from Embeddings to pgvector -->
  <line x1="540" y1="432" x2="540" y2="490" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- pgvector -->
  <rect x="400" y="492" width="280" height="80" rx="12" fill="url(#gradPg)" filter="url(#shadow)"/>
  <text x="540" y="524" text-anchor="middle" font-size="14" font-weight="700" fill="#1E40AF">pgvector</text>
  <text x="540" y="544" text-anchor="middle" font-size="11" fill="#2563EB">Vector database for RAG doc search</text>
  <text x="540" y="560" text-anchor="middle" font-size="10" fill="#3B82F6">port 5432 · PostgreSQL</text>

  <!-- Cloud provider optional box -->
  <rect x="60" y="470" width="280" height="70" rx="12" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="200" y="498" text-anchor="middle" font-size="12" font-weight="600" fill="#64748B">Cloud Providers</text>
  <text x="200" y="516" text-anchor="middle" font-size="10" fill="#94A3B8">OpenAI · Anthropic · Azure · AWS</text>
  <text x="200" y="530" text-anchor="middle" font-size="9" fill="#94A3B8" font-style="italic">optional — configure via dashboard</text>

  <!-- Arrow from LiteLLM to cloud -->
  <line x1="200" y1="432" x2="200" y2="468" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrowGray)"/>

  <!-- Legend -->
  <rect x="120" y="580" width="640" height="30" rx="8" fill="#F1F5F9"/>
  <circle cx="160" cy="595" r="5" fill="#7C3AED"/>
  <text x="172" y="599" font-size="10" fill="#475569">LLM requests</text>
  <circle cx="290" cy="595" r="5" fill="#059669"/>
  <text x="302" y="599" font-size="10" fill="#475569">Embedding / RAG</text>
  <line x1="410" y1="595" x2="430" y2="595" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="438" y="599" font-size="10" fill="#475569">Optional</text>
  <rect x="530" y="589" width="12" height="12" rx="2" fill="url(#gradLlama)"/>
  <text x="548" y="599" font-size="10" fill="#475569">Runs on your server</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366F1"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#059669"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94A3B8"/>
    </marker>
  </defs>
</svg>
